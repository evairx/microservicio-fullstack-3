services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
 
volumes:
  backend_modules:
  frontend_modules: